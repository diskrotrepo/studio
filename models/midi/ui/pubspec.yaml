name: midi_ui
description: MIDI generation UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  web_socket_channel: ^3.0.1
  just_audio: ^0.9.43
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
