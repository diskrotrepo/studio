name: Publish Docker Images

on:
  push:
    branches: [stable, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      backend:
        description: "Rebuild Backend"
        type: boolean
        default: false
      ui:
        description: "Rebuild UI"
        type: boolean
        default: false
      acestep-cpu:
        description: "Rebuild ACE-Step (CPU / ARM)"
        type: boolean
        default: false
      acestep-cuda:
        description: "Rebuild ACE-Step (CUDA)"
        type: boolean
        default: false
      yulan-cpu:
        description: "Rebuild YuLan (CPU / ARM)"
        type: boolean
        default: false
      yulan-cuda:
        description: "Rebuild YuLan (CUDA)"
        type: boolean
        default: false
      bark-cpu:
        description: "Rebuild Bark (CPU / ARM)"
        type: boolean
        default: false
      bark-cuda:
        description: "Rebuild Bark (CUDA)"
        type: boolean
        default: false
      midi:
        description: "Rebuild MIDI"
        type: boolean
        default: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      acestep: ${{ steps.filter.outputs.acestep }}
      yulan: ${{ steps.filter.outputs.yulan }}
      bark: ${{ steps.filter.outputs.bark }}
      midi: ${{ steps.filter.outputs.midi }}
      channel: ${{ steps.channel.outputs.channel }}
      suffix: ${{ steps.channel.outputs.suffix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/studio_backend/**'
            ui:
              - 'packages/studio_ui/**'
            acestep:
              - 'models/ACE-Step-1.5/**'
            yulan:
              - 'models/llama.cpp/**'
            bark:
              - 'models/bark/**'
            midi:
              - 'models/midi/**'

      - name: Determine release channel
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "channel=dev"     >> "$GITHUB_OUTPUT"
            echo "suffix=-dev"     >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest"  >> "$GITHUB_OUTPUT"
            echo "suffix="         >> "$GITHUB_OUTPUT"
          fi

  backend-amd64:
    name: Backend (amd64)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/') || inputs.backend == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./packages
          file: packages/studio_backend/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
            BUILD_BRANCH=${{ github.ref_name }}
          tags: diskrot/diskrot-studio:backend${{ needs.changes.outputs.suffix }}-amd64
          cache-from: type=gha,scope=backend-amd64
          cache-to: type=gha,scope=backend-amd64,mode=max

  backend-arm64:
    name: Backend (arm64)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/') || inputs.backend == true
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./packages
          file: packages/studio_backend/Dockerfile
          push: true
          platforms: linux/arm64
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
            BUILD_BRANCH=${{ github.ref_name }}
          tags: diskrot/diskrot-studio:backend${{ needs.changes.outputs.suffix }}-arm64
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,scope=backend-arm64,mode=max

  backend:
    name: Backend (manifest)
    needs: [changes, backend-amd64, backend-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t diskrot/diskrot-studio:backend-${{ needs.changes.outputs.channel }} \
            diskrot/diskrot-studio:backend${{ needs.changes.outputs.suffix }}-amd64 \
            diskrot/diskrot-studio:backend${{ needs.changes.outputs.suffix }}-arm64

  ui-amd64:
    name: UI (amd64)
    needs: changes
    if: needs.changes.outputs.ui == 'true' || startsWith(github.ref, 'refs/tags/') || inputs.ui == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./packages
          file: packages/studio_ui/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_ENV=local
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
            BUILD_BRANCH=${{ github.ref_name }}
          tags: diskrot/diskrot-studio:ui${{ needs.changes.outputs.suffix }}-amd64
          cache-from: type=gha,scope=ui-amd64
          cache-to: type=gha,scope=ui-amd64,mode=max

  ui-arm64:
    name: UI (arm64)
    needs: changes
    if: needs.changes.outputs.ui == 'true' || startsWith(github.ref, 'refs/tags/') || inputs.ui == true
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
