          tags: diskrot/diskrot-studio:ui${{ needs.changes.outputs.suffix }}-arm64
          cache-from: type=gha,scope=ui-arm64
          cache-to: type=gha,scope=ui-arm64,mode=max

  ui:
    name: UI (manifest)
    needs: [changes, ui-amd64, ui-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t diskrot/diskrot-studio:ui-${{ needs.changes.outputs.channel }} \
            diskrot/diskrot-studio:ui${{ needs.changes.outputs.suffix }}-amd64 \
            diskrot/diskrot-studio:ui${{ needs.changes.outputs.suffix }}-arm64

  acestep-cpu-amd64:
    name: ACE-Step CPU (amd64)
    needs: changes
    if: needs.changes.outputs.acestep == 'true' || startsWith(github.ref, 'refs/tags/') || inputs['acestep-cpu'] == true
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
