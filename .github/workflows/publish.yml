          provenance: mode=max
          sbom: true
          tags: diskrot/diskrot-studio:midi${{ needs.changes.outputs.suffix }}-arm64
          cache-from: type=registry,ref=diskrot/diskrot-studio:cache-midi${{ needs.changes.outputs.suffix }}-arm64
          cache-to: type=registry,ref=diskrot/diskrot-studio:cache-midi${{ needs.changes.outputs.suffix }}-arm64,mode=max

  midi:
    name: MIDI (manifest)
    needs: [changes, midi-amd64, midi-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t diskrot/diskrot-studio:midi-${{ needs.changes.outputs.channel }} \
            diskrot/diskrot-studio:midi${{ needs.changes.outputs.suffix }}-amd64 \
            diskrot/diskrot-studio:midi${{ needs.changes.outputs.suffix }}-arm64
